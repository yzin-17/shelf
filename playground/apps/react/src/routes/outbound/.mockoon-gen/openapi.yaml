openapi: 3.0.3
info:
  title: Outbound Order API
  version: 1.0.0
  description: API contract for outbound order entry and listing.
paths:
  /api/skus/{skuId}/available-warehouses:
    get:
      operationId: getSkuAvailableWarehouses
      summary: Query warehouses with available inventory for a SKU.
      parameters:
        - name: skuId
          in: path
          required: true
          schema:
            type: string
          example: SKU001
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: Search by warehouse id or warehouse name.
          example: WH001
      responses:
        "200":
          description: Available warehouses for the SKU.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailableWarehouseResponse"
              example:
                skuId: SKU001
                warehouses:
                  - warehouseId: WH001
                    warehouseName: Shanghai Warehouse
                    availableQty: 120
                  - warehouseId: WH002
                    warehouseName: Guangzhou Warehouse
                    availableQty: 80
        "404":
          description: SKU not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/outbound-orders:
    post:
      operationId: createOutboundOrder
      summary: Save a draft or submit an outbound order.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutboundOrderRequest"
            example:
              action: SUBMIT
              remark: Batch outbound remark
              items:
                - skuId: SKU001
                  waybills:
                    - waybillNo: SF123456
                      allocations:
                        - warehouseId: WH001
                          outboundQty: 10
                        - warehouseId: WH002
                          outboundQty: 5
      responses:
        "200":
          description: Outbound order creation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOutboundOrderResponse"
              example:
                orderId: "90001"
                orderNo: OUT202607090001
                status: SUBMITTED
        "400":
          description: Invalid outbound order payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listOutboundOrders
      summary: Query outbound order list.
      parameters:
        - name: pageNo
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 200
          example: 20
        - name: orderNo
          in: query
          required: false
          schema:
            type: string
        - name: skuId
          in: query
          required: false
          schema:
            type: string
        - name: waybillNo
          in: query
          required: false
          schema:
            type: string
        - name: warehouseId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutboundOrderStatus"
        - name: createdStartTime
          in: query
          required: false
          schema:
            type: string
        - name: createdEndTime
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paged outbound order list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutboundOrderListResponse"
              example:
                pageNo: 1
                pageSize: 20
                total: 1
                records:
                  - orderId: "90001"
                    orderNo: OUT202607090001
                    status: DRAFT
                    skuCount: 1
                    waybillCount: 2
                    totalOutboundQty: 17
                    createdByName: Zhang San
                    createdAt: "2026-07-09 10:30:00"
                    updatedAt: "2026-07-09 10:35:00"
                    items:
                      - skuId: SKU001
                        waybills:
                          - waybillNo: SF123456
                            allocations:
                              - warehouseId: WH001
                                outboundQty: 6
                              - warehouseId: WH002
                                outboundQty: 4
                          - waybillNo: SF789000
                            allocations:
                              - warehouseId: WH001
                                outboundQty: 7
components:
  schemas:
    AvailableWarehouseResponse:
      type: object
      required:
        - skuId
        - warehouses
      properties:
        skuId:
          type: string
        warehouses:
          type: array
          items:
            $ref: "#/components/schemas/AvailableWarehouse"
    AvailableWarehouse:
      type: object
      required:
        - warehouseId
        - warehouseName
        - availableQty
      properties:
        warehouseId:
          type: string
        warehouseName:
          type: string
        availableQty:
          type: integer
          minimum: 0
    CreateOutboundOrderRequest:
      type: object
      required:
        - action
        - items
      properties:
        action:
          type: string
          enum:
            - SAVE_DRAFT
            - SUBMIT
        remark:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutboundOrderItem"
    OutboundOrderItem:
      type: object
      required:
        - skuId
        - waybills
      properties:
        skuId:
          type: string
        waybills:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutboundWaybill"
    OutboundWaybill:
      type: object
      required:
        - waybillNo
        - allocations
      properties:
        waybillNo:
          type: string
        allocations:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutboundAllocation"
    OutboundAllocation:
      type: object
      required:
        - warehouseId
        - outboundQty
      properties:
        warehouseId:
          type: string
        outboundQty:
          type: integer
          minimum: 1
    CreateOutboundOrderResponse:
      type: object
      required:
        - orderId
        - orderNo
        - status
      properties:
        orderId:
          type: string
        orderNo:
          type: string
        status:
          type: string
          enum:
            - DRAFT
            - SUBMITTED
    OutboundOrderStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - CANCELLED
        - SHIPPED
    OutboundOrderListResponse:
      type: object
      required:
        - pageNo
        - pageSize
        - total
        - records
      properties:
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        records:
          type: array
          items:
            $ref: "#/components/schemas/OutboundOrderRecord"
    OutboundOrderRecord:
      type: object
      required:
        - orderId
        - orderNo
        - status
        - skuCount
        - waybillCount
        - totalOutboundQty
        - createdAt
        - updatedAt
      properties:
        orderId:
          type: string
        orderNo:
          type: string
        status:
          $ref: "#/components/schemas/OutboundOrderStatus"
        skuCount:
          type: integer
          minimum: 0
        waybillCount:
          type: integer
          minimum: 0
        totalOutboundQty:
          type: integer
          minimum: 0
        createdByName:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutboundOrderItem"
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
